<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
  
  <style>
    :root {
      --primary : #004080;
      --accent  : #009933;
      --danger  : #ff4d4d;
      --warning : #F59E0B;
      --critical: #EF4444;
      --success : #10B981;
      --info    : #3B82F6;
      --bg-glass: rgba(255,255,255,0.90);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Comfortaa', cursive;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f2f5;
    }

    .container {
      width: 95%;
      max-width: 900px;
      height: 95vh;
      background: var(--bg-glass);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }

    .screen.active {
      display: flex;
    }

    /* PANTALLA 1: MENÚ */
    #screenMenu {
      padding: 40px 20px;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }

    .menu-header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
    }

    .menu-header h1 {
      color: var(--primary);
      margin: 0;
      font-size: 2rem;
    }

    .menu-header p {
      color: #666;
      margin: 5px 0 0;
      font-size: 0.9rem;
    }

    .blocks-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 700px;
    }

    .block {
      background: white;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-left: 5px solid transparent;
    }

    .block:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .block.cargar { border-left-color: var(--primary); }
    .block.cargar:hover { background: #f0f4ff; }

    .block.consultar { border-left-color: var(--accent); }
    .block.consultar:hover { background: #f0fff4; }

    .block-icon { font-size: 3rem; margin-bottom: 15px; }

    .block-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--primary);
      margin: 0;
    }

    .block.consultar .block-title { color: var(--accent); }

    .block-desc {
      font-size: 0.85rem;
      color: #666;
      margin-top: 8px;
    }

    /* PANTALLA 2: CARGAR REPORTES */
    .header-section {
      padding: 20px;
      background: rgba(255,255,255,0.5);
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    h2 {
      color: var(--primary);
      margin: 0 0 4px;
      font-size: 1.2rem;
      text-align: center;
    }

    h3.fecha {
      color: #555;
      font-size: 0.9rem;
      margin: 0 0 14px;
      text-align: center;
    }

    .profesor-grid {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 10px;
      align-items: end;
    }

    label {
      font-size: 0.8rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(0,64,128,0.15);
    }

    #gruposContainer {
      flex-grow: 1;
      overflow-y: auto;
      padding: 15px;
      background: rgba(240,240,240,0.4);
    }

    .grupo-line {
      background: #fff;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border-left: 4px solid var(--primary);
    }

    .grupo-line input, .grupo-line select {
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    .remove-btn {
      background: #ffebee;
      color: var(--danger);
      border: 1px solid #ffcdd2;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .remove-btn:hover { background: var(--danger); color: white; }

    .footer-section {
      padding: 15px;
      background: rgba(255,255,255,0.8);
      border-top: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    button.main-action {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    #importar {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 10px rgba(0,64,128,0.3);
    }

    #importar:hover { filter: brightness(1.1); }
    #importar:disabled { background: #ccc; cursor: not-allowed; }

    #msgArea {
      max-height: 140px;
      overflow-y: auto;
      font-size: 0.85rem;
      border-radius: 8px;
      padding: 10px;
      background: #f5f5f5;
    }

    .msg-success { background: #e8f5e9; color: #2e7d32; padding: 10px; border: 1px solid #c8e6c9; border-radius: 8px; margin-bottom: 5px; }
    .msg-error { background: #ffebee; color: #c62828; padding: 10px; border: 1px solid #ffcdd2; border-radius: 8px; margin-bottom: 5px; }
    .msg-info { background: #e3f2fd; color: #1976d2; padding: 10px; border: 1px solid #bbdefb; border-radius: 8px; margin-bottom: 5px; }

    .btn-back {
      background: #e5e5e5;
      color: #333;
    }

    .btn-back:hover {
      background: #d0d0d0;
    }

    .empty-hint {
      text-align: center;
      color: #999;
      font-size: 0.85rem;
      padding: 30px 0;
    }

    .loading-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .profesor-grid { grid-template-columns: 1fr; }
      .blocks-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- PANTALLA 1: MENÚ PRINCIPAL -->
  <div id="screenMenu" class="screen active">
    <div class="menu-header">
      <h1>📚 IBIME Calificaciones</h1>
      <p>Sistema de Reportes y Consultas</p>
    </div>

    <div class="blocks-container">
      <div class="block cargar" onclick="irACargar()">
        <div class="block-icon">📤</div>
        <h3 class="block-title">Cargar Reportes</h3>
        <p class="block-desc">Importa calificaciones desde Classroom</p>
      </div>

      <div class="block consultar" onclick="irAConsultar()">
        <div class="block-icon">📊</div>
        <h3 class="block-title">Consultar Reporte</h3>
        <p class="block-desc">Revisa el desempeño de tus alumnos</p>
      </div>
    </div>
  </div>

  <!-- PANTALLA 2: CARGAR REPORTES -->
  <div id="screenCargar" class="screen">
    <div class="header-section">
      <h2>📤 Importación de Calificaciones</h2>
      <h3 class="fecha">Corte al 20 de Marzo 2026</h3>

      <div class="profesor-grid">
        <div>
          <label>Matrícula</label>
          <input type="text" id="matricula" placeholder="12345" autocomplete="off">
        </div>

        <div>
          <label>Docente</label>
          <input type="text" id="profesor" placeholder="Cargando..." readonly style="background:#f9f9f9;">
        </div>

        <div>
          <label>Tipo</label>
          <select id="tipoGrupo">
            <option value="">Elegir…</option>
            <option value="Español">Español</option>
            <option value="Ingles">Inglés</option>
          </select>
        </div>
      </div>
    </div>

    <div id="gruposContainer">
      <p class="empty-hint">Ingresa tu matrícula para cargar los grupos asignados.</p>
    </div>

    <div class="footer-section">
      <div class="btn-row">
        <button id="addGrupo" class="main-action" style="background: #e3f2fd; color: var(--primary);">+ Agregar Grupo</button>
        <button id="importar" class="main-action">IMPORTAR DATOS</button>
      </div>

      <div id="msgArea"></div>

      <div class="btn-row">
        <button class="main-action btn-back" onclick="volverAlMenu()">← Volver al Menú</button>
      </div>
    </div>
  </div>

</div>

<script>
// ================================================================
// FIREBASE CONFIGURATION
// ================================================================

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "tu-proyecto.firebaseapp.com",
  databaseURL: "https://tu-proyecto-default-rtdb.firebaseio.com",
  projectId: "tu-proyecto",
  storageBucket: "tu-proyecto.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================================================================
// VARIABLES GLOBALES
// ================================================================

let datosProfesor = null;
let gruposAgregados = [];
let cargaProfesor = [];

// ================================================================
// 1. NAVEGACIÓN
// ================================================================

function irACargar() {
  document.getElementById('screenMenu').classList.remove('active');
  document.getElementById('screenCargar').classList.add('active');
  document.getElementById('matricula').focus();
}

function irAConsultar() {
  alert('Sistema de consulta en desarrollo');
}

function volverAlMenu() {
  document.getElementById('screenCargar').classList.remove('active');
  document.getElementById('screenMenu').classList.add('active');
  gruposAgregados = [];
  cargaProfesor = [];
  limpiarMensajes();
}

// ================================================================
// 2. OBTENER DATOS DEL PROFESOR DESDE FIREBASE
// ================================================================

document.getElementById('matricula').addEventListener('blur', async function() {
  const matricula = this.value.trim();
  
  if (!matricula) return;
  
  mostrarMensaje('⏳ Buscando profesor...', 'info');
  
  try {
    // Leer desde Firebase: /profesores/{matricula}
    const snapshot = await db.ref(`profesores/${matricula}`).once('value');
    
    if (snapshot.exists()) {
      datosProfesor = snapshot.val();
      
      // Mostrar nombre del profesor
      document.getElementById('profesor').value = datosProfesor.nombre || 'Profesor';
      
      // Guardar carga
      cargaProfesor = Object.values(datosProfesor.clases || {});
      
      // Detectar tipo predominante
      if (cargaProfesor.length > 0) {
        document.getElementById('tipoGrupo').value = cargaProfesor[0].tipo || 'Español';
      }
      
      mostrarMensaje(`✅ Profesor encontrado: ${datosProfesor.nombre}`, 'success');
      
      // Disparar evento de cambio de tipo
      document.getElementById('tipoGrupo').dispatchEvent(new Event('change'));
      
    } else {
      mostrarMensaje('❌ Matrícula no encontrada en el sistema', 'error');
      document.getElementById('profesor').value = '';
      cargaProfesor = [];
    }
    
  } catch (error) {
    console.error('Error:', error);
    mostrarMensaje('❌ Error al conectar con Firebase: ' + error.message, 'error');
  }
});

// ================================================================
// 3. CAMBIO DE TIPO DE GRUPO
// ================================================================

document.getElementById('tipoGrupo').addEventListener('change', function() {
  const tipo = this.value;
  const container = document.getElementById('gruposContainer');
  
  if (!tipo) {
    container.innerHTML = '<p class="empty-hint">Selecciona un tipo de grupo</p>';
    return;
  }
  
  // Filtrar carga por tipo
  const cargaFiltrada = cargaProfesor.filter(c => c.tipo === tipo);
  
  if (cargaFiltrada.length === 0) {
    container.innerHTML = `<p class="empty-hint">No hay ${tipo} asignado para este profesor</p>`;
    return;
  }
  
  // Mostrar grupos disponibles
  container.innerHTML = '';
  cargaFiltrada.forEach(carga => {
    agregarFilaGrupo(carga.grupo, carga.materia, '');
  });
});

// ================================================================
// 4. AGREGAR FILA DE GRUPO
// ================================================================

function agregarFilaGrupo(grupo = '', materia = '', link = '') {
  const container = document.getElementById('gruposContainer');
  const id = 'grupo_' + Date.now();
  
  const fila = document.createElement('div');
  fila.className = 'grupo-line';
  fila.id = id;
  fila.innerHTML = `
    <input type="text" class="grupo" placeholder="Grupo" value="${grupo}" readonly>
    <input type="text" class="asignatura" placeholder="Asignatura" value="${materia}" readonly>
    <input type="text" class="link" placeholder="Pega aquí el link de Google Classroom" value="${link}">
    <button class="remove-btn" onclick="document.getElementById('${id}').remove()">✕</button>
  `;
  
  container.appendChild(fila);
}

// Botón de agregar grupo
document.getElementById('addGrupo').addEventListener('click', function() {
  agregarFilaGrupo();
});

// ================================================================
// 5. IMPORTAR DATOS (BOTÓN PRINCIPAL)
// ================================================================

document.getElementById('importar').addEventListener('click', async function() {
  
  if (!datosProfesor) {
    mostrarMensaje('❌ Por favor ingresa una matrícula válida', 'error');
    return;
  }
  
  const filas = document.querySelectorAll('.grupo-line');
  
  if (filas.length === 0) {
    mostrarMensaje('❌ Debes agregar al menos un grupo', 'error');
    return;
  }
  
  // Validar que todas las filas tengan link
  let todosConLink = true;
  filas.forEach(fila => {
    const link = fila.querySelector('.link').value.trim();
    if (!link) todosConLink = false;
  });
  
  if (!todosConLink) {
    mostrarMensaje('❌ Todos los grupos deben tener un link de Classroom', 'error');
    return;
  }
  
  // Construir datos para enviar
  const datosImportacion = {
    matricula: document.getElementById('matricula').value.trim(),
    profesor: datosProfesor.nombre,
    tipoGrupo: document.getElementById('tipoGrupo').value,
    gruposLinks: []
  };
  
  filas.forEach(fila => {
    datosImportacion.gruposLinks.push({
      grupo: fila.querySelector('.grupo').value.trim(),
      asignatura: fila.querySelector('.asignatura').value.trim(),
      link: fila.querySelector('.link').value.trim()
    });
  });
  
  // Deshabilitar botón
  const btnImportar = document.getElementById('importar');
  btnImportar.disabled = true;
  
  mostrarMensaje('⏳ Procesando importación...', 'info');
  
  try {
    // Llamar al backend de GAS
    await new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((result) => {
          if (result.ok === false) {
            reject(new Error(result.error));
          } else {
            resolve(result);
          }
        })
        .withFailureHandler(reject)
        .importarGruposWebOptimizado(datosImportacion);
    });
    
    // Si llegó aquí, la importación fue exitosa
    mostrarMensaje('✅ Importación iniciada. Procesando...', 'success');
    
    // Esperar un poco y luego guardar en Firebase directamente
    setTimeout(async () => {
      await guardarEnFirebaseDirecto(datosImportacion);
    }, 1000);
    
  } catch (error) {
    console.error('Error:', error);
    mostrarMensaje('❌ Error en la importación: ' + error.message, 'error');
  } finally {
    btnImportar.disabled = false;
  }
});

// ================================================================
// 6. GUARDAR EN FIREBASE DIRECTAMENTE
// ================================================================

async function guardarEnFirebaseDirecto(datosImportacion) {
  
  try {
    const matricula = datosImportacion.matricula;
    const profesor = datosImportacion.profesor;
    const timestamp = new Date().getTime();
    const hoy = new Date().toISOString().split('T')[0];
    
    // ESTRUCTURA 1: Por profesor > grupo > materia > alumno
    const dataPorProfesor = {};
    
    datosImportacion.gruposLinks.forEach(item => {
      const grupoKey = item.grupo.toUpperCase();
      const materiaKey = item.asignatura.substring(0, 3).toUpperCase();
      
      if (!dataPorProfesor[grupoKey]) {
        dataPorProfesor[grupoKey] = {};
      }
      if (!dataPorProfesor[grupoKey][materiaKey]) {
        dataPorProfesor[grupoKey][materiaKey] = {
          grupo: item.grupo,
          materia: item.asignatura,
          link: item.link,
          procesado: false,
          timestamp: timestamp
        };
      }
    });
    
    // Guardar estructura en Firebase
    await db.ref(`calificaciones/por_profesor/${matricula}/${hoy}`).update(dataPorProfesor);
    
    // Guardar en bitácora
    const bitacoraEntry = {
      timestamp: new Date().toISOString(),
      profesor: profesor,
      matricula: matricula,
      grupos: datosImportacion.gruposLinks.map(g => g.grupo),
      materias: datosImportacion.gruposLinks.map(g => g.asignatura),
      registrosAgregados: datosImportacion.gruposLinks.length,
      estado: 'en_proceso'
    };
    
    await db.ref(`bitacora/${hoy}/bitacora_${timestamp}`).set(bitacoraEntry);
    
    mostrarMensaje('✅ ¡Datos guardados en Firebase! Espera a que se procesen las calificaciones...', 'success');
    
    // Limpiar formulario
    setTimeout(() => {
      document.getElementById('gruposContainer').innerHTML = '';
      document.getElementById('matricula').value = '';
      document.getElementById('profesor').value = '';
      document.getElementById('tipoGrupo').value = '';
      gruposAgregados = [];
    }, 2000);
    
  } catch (error) {
    console.error('Error guardando en Firebase:', error);
    mostrarMensaje('❌ Error al guardar en Firebase: ' + error.message, 'error');
  }
}

// ================================================================
// 7. UTILIDADES
// ================================================================

function mostrarMensaje(texto, tipo = 'info') {
  const msgArea = document.getElementById('msgArea');
  const msg = document.createElement('div');
  msg.className = `msg-${tipo}`;
  msg.textContent = texto;
  msgArea.appendChild(msg);
  msgArea.scrollTop = msgArea.scrollHeight;
}

function limpiarMensajes() {
  document.getElementById('msgArea').innerHTML = '';
}

</script>

</body>
</html>
